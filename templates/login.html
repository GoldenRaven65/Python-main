{% extends "base.html" %}
{% block title %}Inloggen{% endblock %}
{% block content %}
<div class="auth-center">
    <div class="auth-box">
        <div class="auth-card">
            <div class="auth-card-header">
                <img src="{{ url_for('static', filename='images/VTM logo.png') }}" alt="VTM logo" class="auth-logo-img">
                <h2 class="auth-card-title">Task Manager</h2>
                <p class="auth-card-subtitle">VTM Groep Maasdijk</p>
            </div>
            <div class="auth-card-body">
                <p class="auth-intro">Inloggen op je account</p>
                <form method="post" class="form-stack">
                    <div>
                        <label for="username" class="form-label">Gebruikersnaam</label>
                        <input type="text" id="username" name="username" required autofocus class="form-input">
                    </div>
                    <div>
                        <label for="password" class="form-label">Wachtwoord</label>
                        <input type="password" id="password" name="password" required class="form-input">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Inloggen</button>
                </form>
                <p class="auth-footer-link">
                    Nog geen account? <a href="{{ url_for('register') }}">Registreren</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
