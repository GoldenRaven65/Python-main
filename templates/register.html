{% extends "base.html" %}
{% block title %}Registreren - Task Manager{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="text-center text-3xl font-bold text-gray-800 mb-2">📋 Task Manager</h2>
            <p class="text-center text-gray-500 mb-8">Account aanmaken</p>
            <form method="post" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Gebruikersnaam</label>
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mailadres</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Wachtwoord</label>
                    <input type="password" id="password" name="password" required minlength="6"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                    <p class="text-xs text-gray-400 mt-1">Minimaal 6 tekens.</p>
                </div>
                <div>
                    <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Wachtwoord bevestigen</label>
                    <input type="password" id="password2" name="password2" required minlength="6"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
                </div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 rounded-lg transition shadow-sm">Registreren</button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6">
                Al een account? <a href="{{ url_for('login') }}" class="text-primary-600 hover:text-primary-800 font-medium">Inloggen</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
