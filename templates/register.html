{% extends "base.html" %}
{% block title %}Registreren{% endblock %}
{% block content %}
<div class="auth-center">
    <div class="auth-box">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-logo">VTM</div>
                <h2 class="auth-card-title">Task Manager</h2>
                <p class="auth-card-subtitle">VTM Groep Maasdijk</p>
            </div>
            <div class="auth-card-body">
                <p class="auth-intro">Account aanmaken</p>
                <form method="post" class="form-stack">
                    <div>
                        <label for="username" class="form-label">Gebruikersnaam</label>
                        <input type="text" id="username" name="username" required autofocus class="form-input">
                    </div>
                    <div>
                        <label for="email" class="form-label">E-mailadres</label>
                        <input type="email" id="email" name="email" required class="form-input">
                    </div>
                    <div>
                        <label for="password" class="form-label">Wachtwoord</label>
                        <input type="password" id="password" name="password" required minlength="6" class="form-input">
                        <p class="form-hint">Minimaal 6 tekens.</p>
                    </div>
                    <div>
                        <label for="password2" class="form-label">Wachtwoord bevestigen</label>
                        <input type="password" id="password2" name="password2" required minlength="6" class="form-input">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Registreren</button>
                </form>
                <p class="auth-footer-link">
                    Al een account? <a href="{{ url_for('login') }}">Inloggen</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
