{% extends "base.html" %}
{% block title %}Registreren{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-vtm-500 px-8 py-6 text-center">
                <div class="inline-block bg-white text-vtm-500 font-extrabold text-2xl px-4 py-2 rounded-xl tracking-tight mb-3">VTM</div>
                <h2 class="text-white font-bold text-lg">Task Manager</h2>
                <p class="text-vtm-100 text-sm">VTM Groep Maasdijk</p>
            </div>
            <div class="p-8">
                <p class="text-center text-gray-500 dark:text-gray-400 mb-6 text-sm font-medium">Account aanmaken</p>
                <form method="post" class="space-y-5">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Gebruikersnaam</label>
                        <input type="text" id="username" name="username" required autofocus
                               class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-vtm-500 focus:border-vtm-500 outline-none transition bg-white dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mailadres</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-vtm-500 focus:border-vtm-500 outline-none transition bg-white dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Wachtwoord</label>
                        <input type="password" id="password" name="password" required minlength="6"
                               class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-vtm-500 focus:border-vtm-500 outline-none transition bg-white dark:bg-gray-700 dark:text-white">
                        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">Minimaal 6 tekens.</p>
                    </div>
                    <div>
                        <label for="password2" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Wachtwoord bevestigen</label>
                        <input type="password" id="password2" name="password2" required minlength="6"
                               class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-vtm-500 focus:border-vtm-500 outline-none transition bg-white dark:bg-gray-700 dark:text-white">
                    </div>
                    <button type="submit" class="w-full bg-vtm-600 hover:bg-vtm-700 text-white font-semibold py-2.5 rounded-lg transition shadow-sm">Registreren</button>
                </form>
                <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
                    Al een account? <a href="{{ url_for('login') }}" class="text-vtm-600 dark:text-vtm-400 hover:text-vtm-800 dark:hover:text-vtm-300 font-medium">Inloggen</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
